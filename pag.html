<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Página de Download</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="container">
		<header>
			<h1>Arquivo para Download</h1>
		</header>

		<nav class="tabs">
			<button class="tab active" data-target="download">Download</button>
			<button class="tab" data-target="info">Login Discord</button>
		</nav>

		<main>
			<section id="download" class="tab-content active">
				<p>Selecione a versão desejada e clique em Baixar.</p>
				<div class="download-card">
					<label>Baixar Instalador do Client</label>
					
					<button id="downloadBtn" class="btn">Baixar</button>
				</div>
			</section>

			<section id="info" class="tab-content">
				<p>Instruções: Baixe o Arquivo. Execute o Instalador. Aproveite :D</p>
			</section>
		</main>
	</div>

	<div id="modal" class="modal hidden">
		<div class="modal-content">
			<p id="modalText">Iniciando download...</p>
		</div>
	</div>

	<div id="versionModal" class="modal hidden">
		<div class="modal-content-select">
			<h2>Selecione a Versão</h2>
			<div class="version-list" id="versionList"></div>
			<button class="btn-close" onclick="document.getElementById('versionModal').classList.add('hidden')">Cancelar</button>
		</div>
	</div>

	<script src="script.js"></script>
</body>
</html>
