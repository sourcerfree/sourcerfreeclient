<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Login Discord</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gidole&display=swap" rel="stylesheet">
	<style>
		*{box-sizing:border-box}
		body{font-family:'Gidole',Arial,sans-serif;background:linear-gradient(135deg,rgba(15,23,42,.92),rgba(30,58,138,.85)),url('https://tse1.mm.bing.net/th/id/OIP.y5b-vyLn1tT-stTrGBEX5gHaEK?pid=Api&P=0&h=180');background-attachment:fixed;background-size:cover;color:#e0e7ff;margin:0;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
		.container{max-width:480px;width:100%;background:rgba(15,23,42,.75);border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:48px 32px;box-shadow:0 16px 48px rgba(0,0,0,.4),inset 0 1px rgba(255,255,255,.1);text-align:center}
		.logo{height:80px;width:auto;margin-bottom:24px}
		h1{margin:0 0 12px;font-size:28px;color:#e0e7ff;font-weight:700}
		.subtitle{color:#a5b4fc;font-size:14px;margin:0 0 32px}
		.discord-buttons{display:flex;flex-direction:column;gap:12px}
		.discord-btn-simple{background:rgba(88,101,242,.2);border:1px solid rgba(88,101,242,.5);color:#b5baf8;padding:12px 16px;border-radius:8px;cursor:pointer;transition:all .3s;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
		.discord-btn-simple:hover{background:rgba(88,101,242,.35);border-color:#7289da;color:#fff;box-shadow:0 4px 12px rgba(88,101,242,.25);transform:translateY(-2px)}
		.discord-btn-simple:active{transform:translateY(0);box-shadow:0 2px 6px rgba(88,101,242,.15)}
		.discord-login-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,#5865F2,#4752C4);border:1px solid rgba(88,101,242,.6);color:#fff;padding:16px 24px;border-radius:8px;cursor:pointer;transition:all .3s;font-weight:700;font-family:'Gidole',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.5px}
		.discord-login-btn:hover{background:linear-gradient(135deg,#6D77FF,#5865F2);box-shadow:0 8px 24px rgba(88,101,242,.4);transform:translateY(-2px)}
		.discord-login-btn:active{transform:translateY(0);box-shadow:0 4px 12px rgba(88,101,242,.3)}
		.discord-login-btn svg{width:24px;height:24px;fill:currentColor}
		.divider{margin:24px 0;border-top:1px solid rgba(99,102,241,.2);color:#a5b4fc;font-size:12px;text-transform:uppercase;letter-spacing:1px;position:relative}
		.divider::after{content:'OU';position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.75);padding:0 8px}
		.info-text{margin-top:24px;color:#a5b4fc;font-size:12px;line-height:1.5}
		@media (max-width:480px){.container{padding:32px 20px}.discord-login-btn{padding:12px 16px;font-size:14px}.logo{height:60px}}
	</style>
</head>
<body>
	<div class="container">
		<img src="img/SOURCER (1).png" alt="Logo" class="logo">
		<h1>Entrar na Comunidade</h1>
		<p class="subtitle">Acesse seu servidor do Discord</p>

		<div class="discord-buttons">
			<button id="discordBtn" class="discord-btn-simple">Entrar no Servidor</button>

			<div class="divider"></div>

			<button id="discordLoginBtn" class="discord-login-btn">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
					<path d="M20.317 4.3671C18.7975 3.5995 17.1359 2.9934 15.3562 2.5Q15.1305 3.0371 14.8682 3.6078C12.9844 3.3355 11.1163 3.3355 9.26261 3.6078C9.00042 3.0371 8.72795 2.5 8.50374 2.5C6.72353 2.9934 5.06194 3.5995 3.54257 4.3671C0.533408 8.9476 -0.31895 13.3953 0.0991801 17.7738C2.18421 19.2933 4.17871 20.2287 6.12328 20.7838C6.8417 19.8879 7.48254 18.9322 8.03905 17.9052C7.03655 17.5898 6.05776 17.1670 5.11477 16.6451C5.37096 16.4606 5.61574 16.2751 5.84922 16.0876C9.99121 18.1693 14.4415 18.1693 18.4816 16.0876C18.7151 16.2751 18.9599 16.4606 19.2155 16.6451C18.2715 17.1670 17.2927 17.5898 16.291 17.9052C16.8475 18.9322 17.4884 19.8879 18.2068 20.7838C20.1514 20.2287 22.1459 19.2933 24.2309 17.7738C24.6778 12.99 23.7952 8.6329 20.317 4.3671ZM8.02957 14.7684C6.8371 14.7684 5.85724 13.7772 5.85724 12.5385C5.85724 11.2998 6.8099 10.3086 8.02957 10.3086C9.24923 10.3086 10.2344 11.2998 10.2344 12.5385C10.2461 13.7772 9.24923 14.7684 8.02957 14.7684ZM15.9776 14.7684C14.7851 14.7684 13.8053 13.7772 13.8053 12.5385C13.8053 11.2998 14.758 10.3086 15.9776 10.3086C17.1973 10.3086 18.1824 11.2998 18.1824 12.5385C18.1824 13.7772 17.1973 14.7684 15.9776 14.7684Z"/>
				</svg>
				Login Com Discord
			</button>
		</div>

		<p class="info-text">Faça login com sua conta Discord para acessar o servidor da comunidade</p>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded',()=>{
			const discordBtn = document.getElementById('discordBtn');
			const discordLoginBtn = document.getElementById('discordLoginBtn');

			// Botão "Entrar no Servidor" - abre o link de convite
			if(discordBtn) {
				discordBtn.addEventListener('click',()=>{
					// SUBSTITUIR: seu-convite-aqui pelo código de convite do seu servidor
					// Exemplo: https://discord.gg/abc123xyz
					window.open('https://discord.gg/ZAB3uYJVzN','_blank');
				});
			}

			// Botão "Login Com Discord" - OAuth2
			if(discordLoginBtn) {
				discordLoginBtn.addEventListener('click',()=>{
					// SUBSTITUIR pelos seus dados do app Discord
					const clientId = '1516587426779496479';

const redirectUri = encodeURIComponent(
    window.location.origin + '/pag.html'
);

const scope = 'identify email';

const oauthUrl =
`https://discord.com/oauth2/authorize?client_id=1516587426779496479&response_type=code&redirect_uri=http%3A%2F%2F127.0.0.1%3A5500%2Fpag.html&scope=email+identify+messages.read+identify.premium`;

window.location.href = oauthUrl;
				});
			}
		});
	</script>
</body>
</html>
